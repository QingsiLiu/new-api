name: Publish image to GHCR (Geili)

# Geili 自有发布流水线：在 GitHub Actions 上构建 New API 镜像并推送到 GHCR。
# - 使用内置 GITHUB_TOKEN（自带 packages:write），无需配置任何密钥。
# - 只产出镜像，不自动部署到服务器；服务器改为 docker pull 拉取。
# - 目标架构 linux/amd64，匹配伦敦生产机（x86_64）。
# 与上游 docker-build.yml（推 Docker Hub、需 DOCKERHUB_* 密钥）互不影响。

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '要构建的分支/标签/SHA（留空=当前触发 ref）'
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: geili-ghcr-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push (amd64) → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Write VERSION
        run: |
          V="$(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)"
          echo "$V" > VERSION
          echo "Building VERSION=$V"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action 会自动把 owner 转小写 → ghcr.io/qingsiliu/new-api
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Summary
        run: |
          {
            echo "### 已推送到 GHCR"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo "digest: ${{ steps.build.outputs.digest }}"
            echo '```'
            echo "服务器拉取示例："
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository_owner }}/new-api:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
