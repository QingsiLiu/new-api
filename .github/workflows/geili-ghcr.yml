name: Publish image to GHCR (Geili)

# Geili 自有发布流水线：在 GitHub Actions 上构建 New API 镜像并推送到 GHCR。
# - 使用内置 GITHUB_TOKEN（自带 packages:write），无需配置任何密钥。
# - 只产出镜像，不自动部署到服务器；服务器改为 docker pull 拉取。
# - 目标架构 linux/amd64，匹配伦敦生产机（x86_64）。
# 与上游 docker-build.yml（推 Docker Hub、需 DOCKERHUB_* 密钥）互不影响。

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: geili-ghcr-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before image publication
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify immutable checkout
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Go tests
        run: go test ./... -count=1

  build-and-push:
    name: Build & push (amd64) → GHCR
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify immutable checkout
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Write VERSION
        run: |
          V="$(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)"
          echo "$V" > VERSION
          echo "Building VERSION=$V"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build candidate image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: new-api:ci-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          provenance: false

      - name: Verify candidate image revision
        run: |
          revision="$(docker image inspect "new-api:ci-$GITHUB_SHA" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')"
          test "$revision" = "$GITHUB_SHA"

      - name: Publish verified image
        id: publish
        env:
          IMAGE_REPO: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          image="${IMAGE_REPO,,}"
          short_sha="${GITHUB_SHA::7}"
          docker tag "new-api:ci-$GITHUB_SHA" "$image:sha-$short_sha"
          docker push "$image:sha-$short_sha"
          tags="$image:sha-$short_sha"
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            for moving_tag in main latest; do
              docker tag "new-api:ci-$GITHUB_SHA" "$image:$moving_tag"
              docker push "$image:$moving_tag"
              tags="$tags"$'\n'"$image:$moving_tag"
            done
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            docker tag "new-api:ci-$GITHUB_SHA" "$image:$release_tag"
            docker push "$image:$release_tag"
            tags="$tags"$'\n'"$image:$release_tag"
          fi
          digest="$(docker buildx imagetools inspect "$image:sha-$short_sha" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          test -n "$digest"
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
            echo "digest=$digest"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "### 已推送到 GHCR"
            echo '```'
            echo "${{ steps.publish.outputs.tags }}"
            echo "digest: ${{ steps.publish.outputs.digest }}"
            echo '```'
            echo "服务器拉取示例："
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository_owner }}/new-api:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
